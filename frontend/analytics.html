<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | Smart Waste</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-theme">
    
    <nav class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-leaf"></i>
            <h2>SmartWaste.AI</h2>
        </div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="route.html"><i class="fa-solid fa-truck-fast"></i> Route Optimizer</a></li>
            <li class="active"><a href="analytics.html"><i class="fa-solid fa-chart-line"></i> Analytics</a></li>
        </ul>
    </nav>

    <main class="content">
        <header>
            <div class="header-title">
                <h1>Data Analytics</h1>
                <p>Waste level distributions and AI insights</p>
            </div>
        </header>

        <section class="charts-panel">
            <div class="card chart-card">
                <div class="card-header">
                    <h3>Current Fill Levels Distribution</h3>
                </div>
                <div class="chart-container">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
            
            <div class="card chart-card">
                <div class="card-header">
                    <h3>Status Overview</h3>
                </div>
                <div class="chart-container donut-container">
                    <canvas id="doughnutChart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
